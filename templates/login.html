{% extends "base.html" %}

{% block title %}Login - Book Store{% endblock %}

{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card glass-card text-center p-4 mx-auto" style="max-width: 450px; width: 100%;">
        <div class="card-body">
            <h3 class="fw-bold text-primary mb-4">Welcome Back</h3>
            <p class="text-muted mb-5">Please choose your login type to continue</p>
            
            <div class="d-grid gap-3">
                <a href="{{ url_for('customer_login_page') }}" class="btn btn-primary btn-lg py-3">
                    <i class="bi bi-person-circle me-2"></i> Login As Customer
                </a>
                <a href="{{ url_for('seller_login_page') }}" class="btn btn-outline-danger btn-lg py-3">
                    <i class="bi bi-shield-lock me-2"></i> Login As Admin
                </a>
            </div>
            
            <hr class="my-4">
            
            <div class="text-center">
                <p class="text-muted">New user? <a href="{{ url_for('register_page') }}" class="text-decoration-none">Register Here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
