{% extends "base.html" %}

{% block title %}Register - Book Store{% endblock %}

{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center py-5">
    <div class="card glass-card p-4 mx-auto" style="max-width: 500px; width: 100%;">
        <div class="card-body">
            <h3 class="text-center fw-bold text-success mb-4"><i class="bi bi-person-plus"></i> Create Account</h3>
            
            <form action="{{ url_for('register') }}" method="post" id="registerForm">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label fw-semibold">First Name</label>
                        <input type="text" class="form-control" name="firstname" id="firstName" placeholder="First Name" required>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label fw-semibold">Last Name</label>
                        <input type="text" class="form-control" name="lastname" id="lastName" placeholder="Last Name" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="Email" class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control" name="mailid" id="Email" placeholder="name@example.com" required>
                </div>

                <div class="mb-3">
                    <label for="passWord" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" name="password" id="passWord" placeholder="Create a password" required>
                        <button class="btn btn-outline-secondary" type="button" id="toggleRegPassword"><i class="bi bi-eye"></i></button>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="phno" class="form-label fw-semibold">Mobile Number</label>
                    <input type="tel" class="form-control" name="phone" id="phno" placeholder="Enter Phone Number" required>
                </div>

                <div class="mb-3">
                    <label for="address" class="form-label fw-semibold">Delivery Address</label>
                    <textarea class="form-control" name="address" id="address" rows="2" placeholder="Enter your full address" required></textarea>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" name="acceptance" id="acceptance" required>
                    <label class="form-check-label small text-muted" for="acceptance">
                        I ACCEPT ALL TERMS &amp; CONDITIONS
                    </label>
                </div>

                <button class="btn btn-success w-100 mb-3" type="submit">Register Me</button>
                
                <div class="text-center">
                    <p class="small text-muted mb-0">Already have an account? <a href="{{ url_for('customer_login_page') }}" class="text-decoration-none">Sign in</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Password toggle
    document.getElementById('toggleRegPassword').addEventListener('click', function (e) {
        const password = document.getElementById('passWord');
        const icon = this.querySelector('i');
        if (password.type === 'password') {
            password.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            password.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    });
</script>
{% endblock %}
